name: Release Windows Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-installer:
    name: Validate, build, and smoke test Windows installer
    runs-on: windows-2025
    timeout-minutes: 75
    outputs:
      version: ${{ steps.release_version.outputs.version }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.23.1
          package-manager-cache: false

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.94.0
          rustc --version --verbose

      - name: Install Rust release-quality tools
        uses: taiki-e/install-action@cf39a74df4a72510be4e5b63348d61067f11e64a # v2.75.0
        with:
          tool: |
            cargo-audit@0.22.2
            cargo-cyclonedx@0.5.9
            cargo-about@0.9.1

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Validate tag and all source versions
        id: release_version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        shell: pwsh
        run: ./scripts/validate-release-version.ps1 -ExpectedTag $env:RELEASE_TAG

      - name: Validate installer smoke safety contract
        run: npm run installer:smoke:verify

      - name: Validate updater manifest contract
        run: npm run updater:manifest:verify

      - name: Audit JavaScript dependencies
        run: npm audit --audit-level=high

      - name: Frontend unit, contract, and accessibility tests
        run: npm run test:coverage

      - name: Fetch and verify pinned media sidecars
        run: npm run tools:fetch

      - name: TypeScript check
        run: npm run check

      - name: Frontend production build
        run: npm run build

      - name: Enforce frontend bundle budget
        run: npm run bundle:budget

      - name: Generate exact dependency notices
        shell: pwsh
        run: |
          ./scripts/generate-npm-notices.ps1
          cargo fetch --locked --manifest-path src-tauri/Cargo.toml
          cargo about generate `
            --frozen `
            --fail `
            --all-features `
            --manifest-path src-tauri/Cargo.toml `
            --config about.toml `
            --output-file artifacts/licenses/SONIC-RUST-THIRD-PARTY-LICENSES.html `
            scripts/cargo-about.hbs

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust Clippy check
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features

      - name: Audit Rust dependencies
        run: cargo audit --file src-tauri/Cargo.lock

      - name: Generate CycloneDX SBOMs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts/sbom" | Out-Null
          $env:SOURCE_DATE_EPOCH = git show -s --format=%ct HEAD

          npx --no-install cyclonedx-npm `
            --output-reproducible `
            --validate `
            --spec-version 1.6 `
            --output-format JSON `
            --output-file "artifacts/sbom/sonic-npm.cdx.json"

          cargo cyclonedx `
            --manifest-path src-tauri/Cargo.toml `
            --format json `
            --spec-version 1.5 `
            --all-features `
            --target x86_64-pc-windows-msvc `
            --override-filename sonic-cargo

          Move-Item -Force `
            -LiteralPath "src-tauri/sonic-cargo.json" `
            -Destination "artifacts/sbom/sonic-cargo.cdx.json"

          ./scripts/generate-license-report.ps1

      - name: Require updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'TAURI_SIGNING_PRIVATE_KEY is required to publish verifiable updates.'
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD is required to unlock the updater signing key.'
          }

      - name: Build Sonic NSIS installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Smoke test freshly built installer
        env:
          EXPECTED_VERSION: ${{ steps.release_version.outputs.version }}
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem `
            -LiteralPath "src-tauri/target/release/bundle/nsis" `
            -Filter "Sonic_*_x64-setup.exe" `
            -File)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one Sonic NSIS installer; found $($installers.Count)."
          }

          ./scripts/smoke-test-installer.ps1 `
            -InstallerPath $installers[0].FullName `
            -ExpectedVersion $env:EXPECTED_VERSION `
            -OperationTimeoutSeconds 600

      - name: Generate signed updater metadata
        env:
          EXPECTED_VERSION: ${{ steps.release_version.outputs.version }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $releaseDirectory = "src-tauri/target/release/bundle/nsis"
          $installers = @(Get-ChildItem `
            -LiteralPath $releaseDirectory `
            -Filter "Sonic_*_x64-setup.exe" `
            -File)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one Sonic updater installer; found $($installers.Count)."
          }
          $signature = "$($installers[0].FullName).sig"
          if (-not (Test-Path -LiteralPath $signature -PathType Leaf)) {
            throw "Tauri did not generate the required updater signature: $signature"
          }
          $publicationDate = (git show -s --format=%cI HEAD).Trim()
          ./scripts/generate-updater-manifest.ps1 `
            -Version $env:EXPECTED_VERSION `
            -Tag $env:RELEASE_TAG `
            -InstallerPath $installers[0].FullName `
            -SignaturePath $signature `
            -OutputPath "$releaseDirectory/latest.json" `
            -PubDate $publicationDate

      - name: Generate release checksums
        shell: pwsh
        run: |
          $releaseDirectory = "src-tauri/target/release/bundle/nsis"
          $installers = @(Get-ChildItem `
            -LiteralPath $releaseDirectory `
            -Filter "Sonic_*_x64-setup.exe" `
            -File)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one verified Sonic installer; found $($installers.Count)."
          }
          $installer = $installers[0]

          $releaseFiles = @(
            $installer
            Get-Item -LiteralPath "$($installer.FullName).sig"
            Get-Item -LiteralPath "$releaseDirectory/latest.json"
            Get-Item -LiteralPath "artifacts/sbom/sonic-npm.cdx.json"
            Get-Item -LiteralPath "artifacts/sbom/sonic-cargo.cdx.json"
            Get-Item -LiteralPath "artifacts/sbom/THIRD_PARTY_LICENSE_REPORT.json"
            Get-Item -LiteralPath "LICENSE"
            Get-Item -LiteralPath "THIRD_PARTY_NOTICES.md"
            Get-Item -LiteralPath "docs/ffmpeg-build-configuration.txt"
            Get-Item -LiteralPath "scripts/tool-manifest.json"
            Get-ChildItem -LiteralPath "licenses" -File
            Get-ChildItem -LiteralPath "artifacts/licenses" -File
          ) | Sort-Object Name
          $checksumLines = foreach ($file in $releaseFiles) {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName
            "$($hash.Hash.ToLowerInvariant())  $($file.Name)"
          }
          $checksumLines | Set-Content -Encoding ascii -LiteralPath "$releaseDirectory/SHA256SUMS.txt"

      - name: Upload verified release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sonic-release-candidate-${{ github.sha }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/Sonic_*_x64-setup.exe
            src-tauri/target/release/bundle/nsis/Sonic_*_x64-setup.exe.sig
            src-tauri/target/release/bundle/nsis/latest.json
            src-tauri/target/release/bundle/nsis/SHA256SUMS.txt
            artifacts/sbom/*.json
            artifacts/licenses/*
            LICENSE
            THIRD_PARTY_NOTICES.md
            docs/ffmpeg-build-configuration.txt
            scripts/tool-manifest.json
            licenses/*.txt

  publish:
    name: Attest and publish release
    needs: build-installer
    runs-on: windows-2025
    timeout-minutes: 15
    permissions:
      contents: write # Create the GitHub Release and upload its assets.
      id-token: write # Request the OIDC identity used for build provenance.
      attestations: write # Publish the release artifact attestation.
      artifact-metadata: write # Associate artifact metadata with the attestation.

    steps:
      - name: Download verified release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sonic-release-candidate-${{ github.sha }}
          path: release-candidate

      - name: Attest release build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            release-candidate/src-tauri/target/release/bundle/nsis/Sonic_*_x64-setup.exe
            release-candidate/src-tauri/target/release/bundle/nsis/Sonic_*_x64-setup.exe.sig
            release-candidate/src-tauri/target/release/bundle/nsis/latest.json
            release-candidate/src-tauri/target/release/bundle/nsis/SHA256SUMS.txt
            release-candidate/artifacts/sbom/*.json
            release-candidate/artifacts/licenses/*
            release-candidate/LICENSE
            release-candidate/THIRD_PARTY_NOTICES.md
            release-candidate/docs/ffmpeg-build-configuration.txt
            release-candidate/scripts/tool-manifest.json
            release-candidate/licenses/*.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ needs.build-installer.outputs.version }}
        shell: pwsh
        run: |
          $root = Resolve-Path "release-candidate"
          $installers = @(Get-ChildItem `
            -LiteralPath "$($root.Path)/src-tauri/target/release/bundle/nsis" `
            -Filter "Sonic_*_x64-setup.exe" `
            -File)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one installer in the verified release candidate; found $($installers.Count)."
          }
          $installer = $installers[0]
          $assets = @(
            $installer.FullName
            (Resolve-Path "$($installer.FullName).sig").Path
            (Resolve-Path "$($root.Path)/src-tauri/target/release/bundle/nsis/latest.json").Path
            (Resolve-Path "$($root.Path)/src-tauri/target/release/bundle/nsis/SHA256SUMS.txt").Path
            (Resolve-Path "$($root.Path)/artifacts/sbom/sonic-npm.cdx.json").Path
            (Resolve-Path "$($root.Path)/artifacts/sbom/sonic-cargo.cdx.json").Path
            (Resolve-Path "$($root.Path)/artifacts/sbom/THIRD_PARTY_LICENSE_REPORT.json").Path
            (Resolve-Path "$($root.Path)/LICENSE").Path
            (Resolve-Path "$($root.Path)/THIRD_PARTY_NOTICES.md").Path
            (Resolve-Path "$($root.Path)/docs/ffmpeg-build-configuration.txt").Path
            (Resolve-Path "$($root.Path)/scripts/tool-manifest.json").Path
          )
          $assets += @(Get-ChildItem -LiteralPath "$($root.Path)/licenses" -File | Select-Object -ExpandProperty FullName)
          $assets += @(Get-ChildItem -LiteralPath "$($root.Path)/artifacts/licenses" -File | Select-Object -ExpandProperty FullName)
          $notesPath = Join-Path $env:RUNNER_TEMP "sonic-release-notes.md"
          @'
          > [!WARNING]
          > **No Authenticode certificate.** Windows SmartScreen may warn before installation. Sonic's in-app updater separately verifies every update with the embedded Tauri signing key. You can also verify `SHA256SUMS.txt` and the GitHub artifact attestation.

          This release passed version consistency, dependency audits, frontend unit/contract/accessibility tests, TypeScript/build checks, Rust formatting, Clippy with warnings denied, Rust tests, packaged sidecar validation, signed updater metadata validation, icon checks, application startup, and silent install/uninstall cleanup on a clean Windows runner.

          The installer includes pinned yt-dlp and CPython components. Deno and FFmpeg are not redistributed by this release; Sonic offers an explicit one-click setup that downloads their pinned artifacts directly from the upstream GitHub releases and verifies every file before use.

          The release includes separate CycloneDX SBOMs, exact Rust and npm dependency notices, pinned-tool provenance, FFmpeg build configuration, and third-party notices. Install only media you own or are authorized to download.
          '@ | Set-Content -Encoding utf8 -LiteralPath $notesPath

          gh release create $env:RELEASE_TAG `
            $assets `
            --repo $env:RELEASE_REPOSITORY `
            --title "Sonic v$($env:RELEASE_VERSION)" `
            --generate-notes `
            --notes-file $notesPath
