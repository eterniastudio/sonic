name: Release Windows Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-installer:
    name: Build and publish installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Fetch and verify media sidecars
        run: npm run tools:fetch

      - name: Build Sonic installer
        run: npm run tauri build

      - name: Generate installer checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem -LiteralPath "src-tauri/target/release/bundle/nsis" -Filter "Sonic_*_x64-setup.exe" |
            Sort-Object LastWriteTime |
            Select-Object -Last 1

          if (-not $installer) {
            throw "The Sonic NSIS installer was not produced."
          }

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName
          "$($hash.Hash)  $($installer.Name)" | Set-Content -Encoding ascii "src-tauri/target/release/bundle/nsis/SHA256SUMS.txt"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-${{ github.ref_name }}-windows-x64
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/Sonic_*_x64-setup.exe
            src-tauri/target/release/bundle/nsis/SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem -LiteralPath "src-tauri/target/release/bundle/nsis" -Filter "Sonic_*_x64-setup.exe" |
            Sort-Object LastWriteTime |
            Select-Object -Last 1
          $checksum = Resolve-Path "src-tauri/target/release/bundle/nsis/SHA256SUMS.txt"

          gh release create "${{ github.ref_name }}" $installer.FullName $checksum.Path --repo "${{ github.repository }}" --title "Sonic ${{ github.ref_name }}" --generate-notes
