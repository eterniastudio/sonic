name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Sonic
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.23.1
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.94.0
          rustc --version --verbose

      - name: Install Rust release-quality tools
        uses: taiki-e/install-action@cf39a74df4a72510be4e5b63348d61067f11e64a # v2.75.0
        with:
          tool: |
            cargo-audit@0.22.2
            cargo-cyclonedx@0.5.9
            cargo-about@0.9.1

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Validate source version consistency
        shell: pwsh
        run: ./scripts/validate-release-version.ps1

      - name: Audit JavaScript dependencies
        run: npm audit --audit-level=high

      - name: Frontend unit, contract, and accessibility tests
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Sonic-frontend-coverage-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: artifacts/coverage/frontend

      - name: Fetch and verify pinned media sidecars
        run: npm run tools:fetch

      - name: TypeScript check
        run: npm run check

      - name: Frontend production build
        run: npm run build

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust Clippy check
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features

      - name: Audit Rust dependencies
        run: cargo audit --file src-tauri/Cargo.lock

      - name: Generate CycloneDX SBOMs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts/sbom" | Out-Null
          $env:SOURCE_DATE_EPOCH = git show -s --format=%ct HEAD

          npx --no-install cyclonedx-npm `
            --output-reproducible `
            --validate `
            --spec-version 1.6 `
            --output-format JSON `
            --output-file "artifacts/sbom/sonic-npm.cdx.json"

          cargo cyclonedx `
            --manifest-path src-tauri/Cargo.toml `
            --format json `
            --spec-version 1.5 `
            --all-features `
            --target x86_64-pc-windows-msvc `
            --override-filename sonic-cargo

          Move-Item -Force `
            -LiteralPath "src-tauri/sonic-cargo.json" `
            -Destination "artifacts/sbom/sonic-cargo.cdx.json"

          ./scripts/generate-license-report.ps1

      - name: Generate exact dependency notices
        shell: pwsh
        run: |
          ./scripts/generate-npm-notices.ps1
          cargo fetch --locked --manifest-path src-tauri/Cargo.toml
          cargo about generate `
            --frozen `
            --fail `
            --all-features `
            --manifest-path src-tauri/Cargo.toml `
            --config about.toml `
            --output-file artifacts/licenses/SONIC-RUST-THIRD-PARTY-LICENSES.html `
            scripts/cargo-about.hbs

      - name: Upload CycloneDX SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Sonic-SBOM-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/sbom/*.json
            artifacts/licenses/*
